spring:
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: member-service-public
              uri: http://ticket-member-service:8081
              predicates:
                - Path=/api/member/login, /api/member

            - id: member-service-private
              uri: http://ticket-member-service:8081
              predicates:
                - Path=/api/member/**
              filters:
                - JwtAuthenticationFilter

            - id: ticket-service-public
              uri: http://ticket-order-service:8082
              predicates:
                - Method=GET


            - id: ticket-service-private
              uri: http://ticket-order-service:8082
              predicates:
                - Path=/api/performance/**, /api/reservation/**
              filters:
                - JwtAuthenticationFilter


            - id: ai-service-private
              uri: http://ticekt-ai-service:8083
              predicates:
                - Path=/ai/**
              filters:
                - JwtAuthenticationFilter


